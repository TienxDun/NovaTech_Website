<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Gradient Xanh Cyan hiện đại -->
    <linearGradient id="cyan-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4facfe" />
      <stop offset="100%" stop-color="#00f2fe" />
    </linearGradient>
    <!-- Gradient Tím Electric nổi bật -->
    <linearGradient id="purple-grad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#667eea" />
      <stop offset="100%" stop-color="#764ba2" />
    </linearGradient>
    
    <style>
      /* Hiệu ứng xoay vòng kim đồng hồ */
      .spin-outer {
        transform-origin: 50% 50%;
        animation: spin 5s linear infinite;
      }
      /* Hiệu ứng xoay ngược kim đồng hồ */
      .spin-inner {
        transform-origin: 50% 50%;
        animation: spin-reverse 3s linear infinite;
      }
      /* Hiệu ứng nhịp đập (thu phóng) cho logo cốt lõi */
      .pulse-core {
        transform-origin: 50% 50%;
        animation: pulse 1.5s ease-in-out infinite alternate;
      }
      
      @keyframes spin { 
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); } 
      }
      @keyframes spin-reverse { 
        0% { transform: rotate(0deg); }
        100% { transform: rotate(-360deg); } 
      }
      @keyframes pulse {
        0% { transform: scale(0.9); opacity: 0.85; }
        100% { transform: scale(1.1); opacity: 1; filter: drop-shadow(0px 0px 4px rgba(0,242,254,0.6)); }
      }
      
      /* Reset darkmode background để luôn nổi bật */
      .bg { fill: #ffffff; }
      @media (prefers-color-scheme: dark) {
        .bg { fill: #0a0a0a; }
        .core-text { stroke: #ffffff; }
      }
    </style>
  </defs>
  
  <!-- Nền trong suốt hoặc bo góc mượt mà -->
  <rect class="bg" width="100" height="100" rx="24" />
  
  <!-- Vòng xoay ngoài (Đứt đoạn to) -->
  <circle class="spin-outer" cx="50" cy="50" r="38" fill="none" stroke="url(#cyan-grad)" stroke-width="5" stroke-dasharray="50 30 20 40" stroke-linecap="round" />
  
  <!-- Vòng xoay trong (Đứt đoạn nhỏ) -->
  <circle class="spin-inner" cx="50" cy="50" r="26" fill="none" stroke="url(#purple-grad)" stroke-width="4" stroke-dasharray="30 20" stroke-linecap="round" />
  
  <!-- Chữ N (NovaTech) ở giữa với hiệu ứng đập -->
  <path class="pulse-core core-text" d="M 40 62 L 40 38 L 60 62 L 60 38" fill="none" stroke="#2b32b2" stroke-width="8" stroke-linejoin="round" stroke-linecap="round" />
</svg>
