<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>NovaTech Solutions</title>
    <script>
      // GitHub Pages SPA redirect: store the path in sessionStorage then redirect to index.html
      var l = window.location;
      sessionStorage.redirect = l.href;
      l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + l.pathname.split('/').slice(0, 2).join('/') + '/?p=1');
    </script>
  </head>
  <body></body>
</html>
